schema_version = 1
id = "sol-terra-luna-codex"
version = "2.0.0"
host = "codex"
driver_role = "driver"
default_role = "driver"
capability_evidence = ["fixture-codex-0.144.0-native-v2"]
billing_assumptions = ["deterministic evaluation fixture; no provider call"]
known_limitations = ["effective model and effort require host evidence"]

[capabilities]
model_override = true
effort_override = true
fork_none = true
fork_all = true

[profiles.driver]
profile = "codex-sol-medium"
client = "codex"
model = "gpt-5.6-sol"
agent_type = "model_routing_sol_medium"
effort = "medium"
cost_tier = "standard"

[profiles.explorer]
profile = "codex-terra-medium"
client = "codex"
model = "gpt-5.6-terra"
agent_type = "model_routing_terra_medium"
effort = "medium"
cost_tier = "standard"
fork_turns = { mode = "none" }

[profiles.worker]
profile = "codex-terra-high"
client = "codex"
model = "gpt-5.6-terra"
agent_type = "model_routing_terra_high"
