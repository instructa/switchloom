fork_turns = { mode = "none" }

[[routes]]
work_type = "exploration"
role = "explorer"

[[routes]]
work_type = "research"
role = "explorer"

[[routes]]
work_type = "code"
role = "worker"

[[routes]]
work_type = "mechanical"
role = "mechanical"

[[routes]]
work_type = "review"
role = "reviewer"

[[routes]]
