name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  forbidden-paths:
    name: Forbidden tracked paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - run: node scripts/hooks/block-forbidden-staged-files.mjs --tracked

  trufflehog:
    name: TruffleHog verified secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55
        with:
          path: .
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  betterleaks:
    name: BetterLeaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install BetterLeaks
        run: |
          set -euo pipefail
          version="1.2.0"
          archive="betterleaks_${version}_linux_x64.tar.gz"
          checksum="5476c1ad776bc884e2b9796f08a44be5a80666833c2987d3d4aadc39cdc6775e"
          curl -fsSL "https://github.com/betterleaks/betterleaks/releases/download/v${version}/${archive}" -o "/tmp/${archive}"
          echo "${checksum}  /tmp/${archive}" | sha256sum -c -
          tar -xzf "/tmp/${archive}" -C /tmp
          sudo install -m 0755 /tmp/betterleaks /usr/local/bin/betterleaks
      - run: betterleaks git --no-banner --redact=100 --config .betterleaks.toml .
