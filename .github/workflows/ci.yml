name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.85.0 --profile minimal --component rustfmt --component clippy
      - name: Format
        run: cargo +1.85.0 fmt --all -- --check
      - name: Clippy
        run: cargo +1.85.0 clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo +1.85.0 test --workspace --all-targets --all-features
      - name: Migration manifest
        run: sh scripts/check-migration-manifest.sh
      - name: Package
        run: cargo +1.85.0 package --workspace --allow-dirty --no-verify
      - name: Package content audit
        run: |
          package="$(find target/package -maxdepth 1 -name 'model-routing-*.crate' | head -n 1)"
          test -n "$package"
          cargo +1.85.0 package --workspace --list --allow-dirty --no-verify > package-files.txt
          ! grep -E '(^|/)(\.planr|planr\.sqlite|\.env|receipt|secret|credential)' package-files.txt

  distribution:
    name: npm distribution
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install Rust
        run: rustup toolchain install 1.85.0 --profile minimal
      - name: Build CLI binaries for PTY tests
        run: cargo +1.85.0 build --bins
      - name: Test npm wrapper
        run: node --test npm/*.test.mjs
