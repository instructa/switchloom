name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Verify release contract
        env:
          TAG: ${{ github.ref_name }}
        run: |
          crate_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          package_version="$(jq -r .version package.json)"
          test "v$crate_version" = "$TAG"
          test "$package_version" = "$crate_version"
          grep -q "^## \[$crate_version\]" CHANGELOG.md
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          prerelease_flag=""
          case "$TAG" in *-*) prerelease_flag="--prerelease" ;; esac
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            $prerelease_flag \
            --title "Switchloom $TAG" \
            --generate-notes

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            rust_target: aarch64-apple-darwin
            runner: macos-14
          - target: darwin-x86_64
            rust_target: x86_64-apple-darwin
            runner: macos-14
          - target: linux-x86_64
            rust_target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install Rust target
        run: rustup target add ${{ matrix.rust_target }}
      - name: Build release archive
        env:
          SWITCHLOOM_TARGET: ${{ matrix.target }}
          SWITCHLOOM_CARGO_TARGET: ${{ matrix.rust_target }}
        run: scripts/build-release.sh
      - name: Smoke-test native binary
        if: matrix.target != 'darwin-x86_64'
        run: ./target/${{ matrix.rust_target }}/release/model-routing --version
      - name: Upload release archive
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            "dist/switchloom-${{ matrix.target }}.tar.gz"

  finalize:
    name: Publish checksums and release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download release archives
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir assets
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'switchloom-*.tar.gz' \
            --dir assets
      - name: Generate aggregate checksums
        run: |
          cd assets
          sha256sum switchloom-*.tar.gz > SHA256SUMS
          cat SHA256SUMS
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            assets/SHA256SUMS
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false

  npm-publish:
    name: Publish npm package
    needs: finalize
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Download and verify release archives
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir assets
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'switchloom-*.tar.gz' \
            --pattern SHA256SUMS \
            --dir assets
          cd assets
          sha256sum -c SHA256SUMS
      - name: Bundle platform binaries
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          for target in darwin-arm64 darwin-x86_64 linux-arm64 linux-x86_64; do
            case "$target" in
              darwin-arm64) rust_target="aarch64-apple-darwin"; runner="macos-14" ;;
              darwin-x86_64) rust_target="x86_64-apple-darwin"; runner="macos-14" ;;
              linux-arm64) rust_target="aarch64-unknown-linux-gnu"; runner="ubuntu-24.04-arm" ;;
              linux-x86_64) rust_target="x86_64-unknown-linux-gnu"; runner="ubuntu-24.04" ;;
            esac
            mkdir -p "extract/$target" "npm/native/$target"
            tar -xzf "assets/switchloom-$target.tar.gz" -C "extract/$target"
            install -m 755 "extract/$target/model-routing" "npm/native/$target/model-routing"
            sha="$(shasum -a 256 "npm/native/$target/model-routing" | awk '{print $1}')"
            version_output="$(if [ "$target" = "linux-x86_64" ]; then "./npm/native/$target/model-routing" --version; else printf 'model-routing %s' "$version"; fi)"
            jq -n \
              --arg target "$target" \
              --arg path "npm/native/$target/model-routing" \
              --arg version "$version_output" \
              --arg sha256 "$sha" \
              --arg rust_target "$rust_target" \
              --arg runner "$runner" \
              --arg git_sha "$(git rev-parse HEAD)" \
              --arg built_at "release-$TAG" \
              '{target:$target,rust_target:$rust_target,runner:$runner,path:$path,version:$version,sha256:$sha256,git_sha:$git_sha,built_at:$built_at}' \
              > "assets/$target.native-provenance.json"
          done
          jq -s \
            --arg package_version "$version" \
            --arg git_sha "$(git rev-parse HEAD)" \
            '{schema_version:"switchloom.native_provenance.v1",package_version:$package_version,git_sha:$git_sha,generated_by:"github-actions-release",targets:.}' \
            assets/*.native-provenance.json > npm/native/provenance.json
          node scripts/validate-native-provenance.mjs
          test "$(./npm/native/linux-x86_64/model-routing --version)" = "model-routing $version"
          SWITCHLOOM_NATIVE_BIN="$PWD/npm/native/linux-x86_64/model-routing" node npm/bin/model-routing.js --version
          bash scripts/npm-pack-check.sh
      - name: Publish npm package
        env:
          TAG: ${{ github.ref_name }}
          NODE_AUTH_TOKEN: ""
        run: |
          case "$TAG" in
            *-*) npm publish --access public --provenance --tag next ;;
            *) npm publish --access public --provenance ;;
          esac

  homebrew-tap:
    name: Update Homebrew tap
    needs: finalize
    if: ${{ vars.HOMEBREW_TAP_ENABLED == 'true' && !contains(github.ref_name, '-') }}
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir assets
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern SHA256SUMS \
            --dir assets
      - name: Generate formula
        env:
          TAG: ${{ github.ref_name }}
        run: scripts/generate-formula.sh "${TAG#v}" assets/SHA256SUMS > switchloom.rb
      - name: Push formula to tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          test -n "$TAP_TOKEN"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/instructa/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp switchloom.rb tap/Formula/switchloom.rb
          cd tap
          git config user.name "switchloom-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add Formula/switchloom.rb
          if ! git diff --cached --quiet; then
            git commit -m "switchloom ${TAG}"
            git push origin HEAD
          fi
