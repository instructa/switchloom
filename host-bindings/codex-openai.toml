schema_version = 1
id = "codex-openai"
version = "2.0.0"
host = "codex"
runtime_class = "native-subagent"
driver_role = "driver"
default_role = "driver"
capability_evidence = ["codex-cli-0.144.5-native-v2"]
billing_assumptions = ["Model Routing records declared tiers; Codex remains billing authority"]
known_limitations = ["native multi-agent v2 and the requested model must be active on the current Codex backend"]

[capabilities]
model_override = true
effort_override = true
fork_none = true
fork_all = true

[profiles.driver]
profile = "codex-sol-medium"
client = "codex"
model = "gpt-5.6-sol"
agent_type = "model_routing_sol_medium"
effort = "medium"
cost_tier = "standard"

[profiles.explorer]
profile = "codex-terra-medium"
client = "codex"
model = "gpt-5.6-terra"
agent_type = "model_routing_terra_medium"
effort = "medium"
cost_tier = "standard"
fork_turns = { mode = "none" }

[profiles.worker]
profile = "codex-terra-high"
client = "codex"
model = "gpt-5.6-terra"
agent_type = "model_routing_terra_high"
effort = "high"
cost_tier = "standard"
fork_turns = { mode = "none" }

[profiles.mechanical]
profile = "codex-luna-xhigh"
client = "codex"
model = "gpt-5.6-luna"
agent_type = "model_routing_luna_xhigh"
effort = "xhigh"
cost_tier = "premium"
fork_turns = { mode = "none" }

[profiles.reviewer]
profile = "codex-sol-high"
client = "codex"
model = "gpt-5.6-sol"
agent_type = "model_routing_sol_high"
effort = "high"
cost_tier = "premium"
fork_turns = { mode = "none" }

[profiles.moonshot]
profile = "codex-sol-ultra"
client = "codex"
model = "gpt-5.6-sol"
agent_type = "model_routing_sol_ultra"
effort = "ultra"
cost_tier = "premium"
fork_turns = { mode = "none" }

[[routes]]
work_type = "exploration"
role = "explorer"

[[routes]]
work_type = "research"
role = "explorer"

[[routes]]
work_type = "code"
role = "worker"

[[routes]]
work_type = "mechanical"
role = "mechanical"

[[routes]]
work_type = "review"
role = "reviewer"

[verification]
id = "codex-cli-0.144.5-native-v2"
verified_at_unix = 1784160000
max_age_seconds = 31536000

[[artifacts]]
path = ".codex/agents/model-routing-sol-medium.toml"
kind = "codex_agent"
content = '''name = "model_routing_sol_medium"
description = "Normal Model Routing orchestration and synthesis."
model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"

developer_instructions = """
Orchestrate the Model Routing workflow, delegate bounded work by agent type, and retain synthesis ownership.
"""
'''

[[artifacts]]
path = ".codex/agents/model-routing-terra-medium.toml"
kind = "codex_agent"
content = '''name = "model_routing_terra_medium"
description = "Repository exploration and research."
model = "gpt-5.6-terra"
model_reasoning_effort = "medium"
sandbox_mode = "read-only"

developer_instructions = """
Explore the assigned scope, report concrete evidence, and do not edit files.
"""
'''

[[artifacts]]
path = ".codex/agents/model-routing-terra-high.toml"
kind = "codex_agent"
content = '''name = "model_routing_terra_high"
description = "Normal implementation and testing."
model = "gpt-5.6-terra"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"

developer_instructions = """
Implement one picked item, keep the slice small, and record real verification evidence.
"""
'''

[[artifacts]]
path = ".codex/agents/model-routing-luna-xhigh.toml"
kind = "codex_agent"
content = '''name = "model_routing_luna_xhigh"
description = "Bounded checklist-driven and mechanical implementation."
model = "gpt-5.6-luna"
model_reasoning_effort = "xhigh"
sandbox_mode = "workspace-write"

developer_instructions = """
Follow one tightly bounded item, verify the result, and stop.
"""
'''

[[artifacts]]
path = ".codex/agents/model-routing-sol-high.toml"
kind = "codex_agent"
content = '''name = "model_routing_sol_high"
description = "Independent final review."
model = "gpt-5.6-sol"
model_reasoning_effort = "high"
sandbox_mode = "read-only"

developer_instructions = """
Independently verify acceptance criteria and evidence, and report findings before the verdict.
"""
'''

[[artifacts]]
path = ".codex/agents/model-routing-sol-ultra.toml"
kind = "codex_agent"
content = '''name = "model_routing_sol_ultra"
description = "Explicit moonshot planning only."
model = "gpt-5.6-sol"
model_reasoning_effort = "ultra"
sandbox_mode = "read-only"

developer_instructions = """
Work only on an explicitly selected moonshot planning task; do not treat this role as the balanced default.
"""
'''
