schema_version = 1
id = "mixed-host"
version = "2.0.0"
host = "mixed-host"
runtime_class = "native-subagent"
driver_role = "driver"
default_role = "driver"
capability_evidence = ["codex-0.145.0-native-v2", "builtin-cursor-project-agent-contract"]
billing_assumptions = ["Each host remains authoritative for its own billing and availability"]
known_limitations = ["effective route evidence must be collected independently from each active host backend", "Luna remains experimental/unverified for Codex V2 and is not used by certified default routes"]

[capabilities]
model_override = true
effort_override = true
fork_none = true
fork_all = true

[profiles.driver]
profile = "mixed-cursor-fable-driver"
client = "cursor"
model = "fable-5"
cost_tier = "premium"

[profiles.worker]
profile = "mixed-codex-terra-high"
client = "codex"
model = "gpt-5.6-terra"
agent_type = "model_routing_terra_high"
effort = "high"
cost_tier = "standard"
fork_turns = { mode = "none" }

[profiles.mechanical]
profile = "mixed-codex-terra-high-mechanical"
client = "codex"
model = "gpt-5.6-terra"
agent_type = "model_routing_terra_mechanical"
effort = "high"
cost_tier = "standard"
fork_turns = { mode = "none" }

[profiles.experimental_luna]
profile = "mixed-codex-luna-xhigh-experimental"
client = "codex"
model = "gpt-5.6-luna"
agent_type = "model_routing_luna_xhigh"
effort = "xhigh"
cost_tier = "premium"
fork_turns = { mode = "none" }

[profiles.reviewer]
profile = "mixed-codex-sol-high"
client = "codex"
model = "gpt-5.6-sol"
agent_type = "model_routing_sol_high"
effort = "high"
cost_tier = "premium"
fork_turns = { mode = "none" }

[[routes]]
work_type = "code"
role = "worker"

[[routes]]
work_type = "mechanical"
role = "mechanical"

[[routes]]
work_type = "review"
role = "reviewer"

[verification]
id = "builtin-mixed-host-native-v2"
verified_at_unix = 1784160000
max_age_seconds = 31536000

[[artifacts]]
path = ".cursor/agents/model-routing-fable-driver.md"
kind = "cursor_agent"
content = '''---
name: model-routing-fable-driver
model: fable-5
---
Orchestrate the Model Routing workflow and dispatch bounded Codex worker roles.
'''

[[artifacts]]
path = ".codex/agents/model-routing-terra-high.toml"
kind = "codex_agent"
content = '''name = "model_routing_terra_high"
description = "Normal implementation and testing."
model = "gpt-5.6-terra"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"

developer_instructions = """
Implement one picked item, keep the slice small, and record real verification evidence.
"""
'''

[[artifacts]]
path = ".codex/agents/model-routing-terra-mechanical.toml"
kind = "codex_agent"
content = '''name = "model_routing_terra_mechanical"
description = "Certified Terra mechanical implementation."
model = "gpt-5.6-terra"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"

developer_instructions = """
Follow one tightly bounded mechanical item, verify the result, and stop.
"""
'''

[[artifacts]]
path = ".codex/agents/model-routing-luna-xhigh.toml"
kind = "codex_agent"
content = '''name = "model_routing_luna_xhigh"
description = "Experimental Luna role; not certified for deterministic Codex V2 routing."
model = "gpt-5.6-luna"
model_reasoning_effort = "xhigh"
sandbox_mode = "workspace-write"

developer_instructions = """
Use only when explicitly selected as experimental/unverified. Do not treat this role as a certified Switchloom default.
"""
'''

[[artifacts]]
path = ".codex/agents/model-routing-sol-high.toml"
kind = "codex_agent"
content = '''name = "model_routing_sol_high"
description = "Independent final review."
model = "gpt-5.6-sol"
model_reasoning_effort = "high"
sandbox_mode = "read-only"

developer_instructions = """
Independently verify acceptance criteria and evidence, and report findings before the verdict.
"""
'''
