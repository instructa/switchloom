schema_version = 1
id = "claude-native"
version = "1.0.0"
host = "claude-code"
runtime_class = "native-subagent"
driver_role = "driver"
default_role = "driver"
capability_evidence = ["builtin-claude-project-agent-contract"]
billing_assumptions = ["Model Routing records declared tiers; Claude Code remains billing authority"]
known_limitations = ["session environment may preempt the requested subagent model", "effective child model is advisory unless a live Claude Code receipt exposes the executed model"]

[capabilities]
model_override = true
effort_override = true
fork_none = true
fork_all = false

[profiles.driver]
profile = "claude-native-driver"
client = "claude-code"
model = "opus"
effort = "high"
cost_tier = "premium"

[profiles.worker]
profile = "claude-native-worker"
client = "claude-code"
model = "sonnet"
effort = "medium"
cost_tier = "standard"
fork_turns = { mode = "none" }

[[routes]]
work_type = "code"
role = "worker"
fallback_roles = ["driver"]

[verification]
id = "builtin-claude-native-v1"
verified_at_unix = 1783987200
max_age_seconds = 31536000

[[artifacts]]
path = ".claude/agents/model-routing-preset-worker.md"
kind = "claude_agent"
content = '''---
name: model-routing-preset-worker
model: sonnet
effort: medium
---
Follow the generated role instructions and preserve routing evidence. Treat the declared model and effort as requested values; only claim a verified verdict when a live Claude Code receipt exposes matching effective execution.
'''
