schema_version = 1
id = "cursor-fable-grok"
version = "1.0.0"
host = "cursor"
runtime_class = "native-subagent"
driver_role = "driver"
default_role = "driver"
capability_evidence = ["builtin-cursor-project-agent-contract"]
billing_assumptions = ["Model Routing records declared tiers; Cursor remains billing authority"]
known_limitations = ["workspace policy or Max Mode may override the requested model", "effective child model is advisory unless a live Cursor receipt exposes the executed model"]

[capabilities]
model_override = true
effort_override = false
fork_none = true
fork_all = false

[profiles.driver]
profile = "cursor-fable-driver"
client = "cursor"
model = "fable-5"
cost_tier = "premium"

[profiles.worker]
profile = "cursor-grok-worker"
client = "cursor"
model = "cursor-grok-4.5-medium"
cost_tier = "standard"
fork_turns = { mode = "none" }

[[routes]]
work_type = "code"
role = "worker"
fallback_roles = ["driver"]

[verification]
id = "builtin-cursor-fable-grok-v1"
verified_at_unix = 1783987200
max_age_seconds = 31536000

[[artifacts]]
path = ".cursor/agents/model-routing-preset-worker.md"
kind = "cursor_agent"
content = '''---
name: model-routing-preset-worker
model: cursor-grok-4.5-medium
---
Follow the generated role instructions and preserve routing evidence. Treat the declared model as requested; only claim a verified verdict when a live Cursor receipt exposes matching effective execution.
'''
